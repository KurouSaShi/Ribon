<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<title>Ribbon — Markdown Editor</title>
<meta name="description" content="スマホ専用・オフライン対応のシンプルな Markdown エディター。複数のメモを保存できます。">
<meta name="theme-color" content="#1f2124">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ribbon">
<meta name="format-detection" content="telephone=no">

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="64x64" href="icons/favicon-64.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app" id="app" data-view="edit">

  <header class="topbar">
    <button id="listBtn" class="icon-btn" type="button" aria-label="メモ一覧">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="4" y1="7" x2="20" y2="7"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="17" x2="20" y2="17"/>
      </svg>
    </button>
    <span class="brand">Ribbon</span>
    <button id="saveBtn" class="btn" type="button">保存</button>
  </header>

  <nav class="tabbar" role="tablist" aria-label="表示切替">
    <button class="tab-btn active" data-view="edit" role="tab" aria-selected="true">編集</button>
    <button class="tab-btn" data-view="preview" role="tab" aria-selected="false">プレビュー</button>
    <span class="tab-indicator" id="tabIndicator"></span>
  </nav>

  <main class="workspace" id="workspace" data-view="edit">
    <section class="pane pane-editor">
      <div class="editor-stack">
        <div id="editorHighlight" class="editor-highlight" aria-hidden="true"></div>
        <textarea id="editor" class="editor" spellcheck="false" placeholder="# ここから書き始めましょう"></textarea>
      </div>
    </section>
    <section class="pane pane-preview">
      <div id="preview" class="preview markdown-body"></div>
    </section>
  </main>

  <!-- キーボード直上の記法ショートカットバー（編集タブのときだけ表示） -->
  <div class="format-toolbar" id="formatToolbar" role="toolbar" aria-label="書式ツール">
    <div class="ft-main">

      <!-- 左固定：上段＝カーソル移動、下段＝元に戻す／やり直し -->
      <div class="ft-fixed ft-fixed-left">
        <div class="ft-fixed-row">
          <button id="moveLeftBtn" class="fbtn" type="button" aria-label="カーソルを左へ移動">←</button>
          <button id="moveRightBtn" class="fbtn" type="button" aria-label="カーソルを右へ移動">→</button>
        </div>
        <div class="ft-fixed-row">
          <button id="undoBtn" class="fbtn" type="button" aria-label="元に戻す" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
          </button>
          <button id="redoBtn" class="fbtn" type="button" aria-label="やり直し" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 14 5-5-5-5"/><path d="M20 9H9.5a5.5 5.5 0 0 0 0 11H13"/></svg>
          </button>
        </div>
      </div>

      <!-- 中央スクロール：上段＝記法ショートカット、下段＝コピー／貼り付けなど -->
      <div class="ft-rows">
        <div class="ft-scroll" id="ftScrollRow1">
          <button class="fbtn fbtn-h" data-cmd="h" data-longpress="heading" id="hBtn" aria-label="見出し（長押しでレベル選択）">H</button>
          <button class="fbtn" data-cmd="bold" data-longpress="wrap" id="boldBtn" aria-label="太字（長押しで開始・終了マーク）"><strong>B</strong></button>
          <button class="fbtn" data-cmd="italic" data-longpress="wrap" id="italicBtn" aria-label="斜体（長押しで開始・終了マーク）"><em>I</em></button>
          <button class="fbtn" data-cmd="strike" data-longpress="wrap" id="strikeBtn" aria-label="取り消し線（長押しで開始・終了マーク）"><s>S</s></button>
          <button class="fbtn" data-cmd="code" aria-label="インラインコード">&lt;/&gt;</button>
          <button class="fbtn" data-cmd="quote" aria-label="引用">"―</button>
          <span class="fdiv"></span>
          <button class="fbtn" data-cmd="ul" data-longpress="listInsert" data-marker="- " id="ulBtn" aria-label="箇条書き（長押しで字下げ／字上げした新しい項目を挿入）">•―</button>
          <button class="fbtn" data-cmd="ol" data-longpress="listInsert" data-marker="1. " id="olBtn" aria-label="番号付きリスト（長押しで字下げ／字上げした新しい項目を挿入）">1.―</button>
          <button class="fbtn" data-cmd="hr" aria-label="区切り線">―――</button>
          <button class="fbtn" data-cmd="link" aria-label="リンク">🔗</button>
          <button class="fbtn" data-cmd="image" aria-label="画像">🖼</button>
          <button class="fbtn" data-cmd="codeblock" aria-label="コードブロック">{ }</button>
          <button class="fbtn" data-cmd="table" data-longpress="table" aria-label="表（長押しで行・列・見出しを設定）">▦</button>
          <button class="fbtn" data-cmd="indent" data-longpress="indent" id="tabBtn" aria-label="字下げ（長押しで字上げ・通常も選べます）">⇥</button>
        </div>
        <div class="ft-scroll" id="ftScrollRow2">
          <button class="fbtn" data-cmd="paste" aria-label="貼り付け">📋</button>
          <button class="fbtn" data-cmd="copy" aria-label="コピー">⧉</button>
          <button class="fbtn" data-cmd="cut" aria-label="切り取り">✂</button>
        </div>
      </div>

      <!-- 右固定：上段＝文字数／語数、下段＝選択範囲を広げる -->
      <div class="ft-fixed ft-fixed-right">
        <div class="ft-fixed-row">
          <button id="statsBtn" class="ft-stat" type="button" aria-label="文字数と語数を切り替え">
            <span id="statsValue">0文字</span>
          </button>
          <div class="ft-stat ft-stat-static" id="headingCountEl">見出し 0</div>
        </div>
        <div class="ft-fixed-row">
          <button id="selectLeftBtn" class="fbtn" type="button" aria-label="左方向へ選択を広げる">←</button>
          <button id="selectRightBtn" class="fbtn" type="button" aria-label="右方向へ選択を広げる">→</button>
        </div>
      </div>

    </div>
  </div>


  <!-- 長押しメニュー：見出しレベル／リストの字下げ・字上げ -->
  <div class="press-menu" id="pressMenu"></div>

  <!-- 長押しパネル：表の行・列・見出し設定 -->
  <div class="table-panel" id="tablePanel">
    <div class="tp-row">
      <span class="tp-label">行</span>
      <div class="tp-stepper">
        <button type="button" class="tp-step" data-tp="rows-" aria-label="行を減らす">−</button>
        <span id="tpRowsVal">3</span>
        <button type="button" class="tp-step" data-tp="rows+" aria-label="行を増やす">＋</button>
      </div>
    </div>
    <div class="tp-row">
      <span class="tp-label">列</span>
      <div class="tp-stepper">
        <button type="button" class="tp-step" data-tp="cols-" aria-label="列を減らす">−</button>
        <span id="tpColsVal">3</span>
        <button type="button" class="tp-step" data-tp="cols+" aria-label="列を増やす">＋</button>
      </div>
    </div>
    <label class="tp-row tp-toggle-row">
      <span class="tp-label">見出し行</span>
      <span class="tp-switch"><input type="checkbox" id="tpHeaderChk" checked><span class="tp-slider"></span></span>
    </label>
    <div class="tp-actions">
      <button type="button" class="btn" id="tpCancel">キャンセル</button>
      <button type="button" class="btn btn-primary" id="tpInsert">挿入</button>
    </div>
  </div>

  <div class="sheet-overlay" id="pressOverlay"></div>

  <!-- メモ一覧（ボトムシート） -->
  <div class="sheet-overlay" id="sheetOverlay"></div>
  <div class="bottom-sheet" id="listSheet">
    <div class="sheet-handle"></div>

    <div class="sheet-top-actions">
      <button id="newNoteBtn" class="btn btn-primary" type="button">＋ 新規メモ</button>
      <button id="installBtn" class="btn hidden" type="button">インストール</button>
    </div>

    <div class="sheet-divider"></div>

    <div class="sheet-list-header">表示設定</div>
    <div class="settings-row">
      <span class="settings-label">文字サイズ</span>
      <div class="settings-stepper">
        <button type="button" class="settings-step" id="fontSizeDown" aria-label="文字を小さく">−</button>
        <span id="fontSizeVal">16px</span>
        <button type="button" class="settings-step" id="fontSizeUp" aria-label="文字を大きく">＋</button>
      </div>
    </div>
    <label class="settings-row settings-toggle-row">
      <span class="settings-label">特殊文字をハイライト（*　~　# など）</span>
      <span class="settings-switch"><input type="checkbox" id="highlightChk"><span class="settings-slider"></span></span>
    </label>

    <div class="sheet-list-header">メモ一覧</div>
    <ul id="noteItems" class="note-items"></ul>

    <div class="sheet-divider"></div>

    <div class="sheet-list-header">
      プラグイン
      <button id="addPluginBtn" class="sheet-header-btn" type="button">＋ 追加</button>
    </div>
    <p class="plugin-warning">信頼できる作成者のプラグイン（.js）のみ追加してください。プラグインは任意のコードを実行できます。</p>
    <input type="file" id="pluginFileInput" accept=".js,text/javascript" class="hidden">
    <ul id="pluginItems" class="plugin-items"></ul>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="js/vendor/marked.min.js"></script>
<script src="js/vendor/purify.min.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
